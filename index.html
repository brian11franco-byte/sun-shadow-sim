  if (isNight && !autoPlaying) startTwinkle();
  else if (!isNight) stopTwinkle();
}

// ============================================================
// INTERACTION
// ============================================================
// Full-circle angle [0.05, 2π-0.05]: sun drag across horizon into night.
function angleFromPointerFull(px, py) {
  const dx = px - arcCX, dy = py - arcCY;
  let a = Math.atan2(-dy / arcRY, -dx / arcRX);
  if (a < 0) a += 2 * Math.PI;
  return Math.max(0.05, Math.min(2 * Math.PI - 0.05, a));
}

// Upper-half angle [0.05, π-0.05]: moon drag above horizon.
function angleFromPointer(px, py) {
  const dx = px - arcCX, dy = py - arcCY;
  let a = Math.atan2(-dy / arcRY, -dx / arcRX);
  if (a < 0.05) a = 0.05;
  if (a > Math.PI - 0.05) a = Math.PI - 0.05;
  return a;
}

// Returns { what:'sun'|'moon'|'sceneObj', obj? } or null.
// Sun/moon take priority; scene objects tested front-to-back (highest depth first).
function findDraggableAtPointer(px, py) {
  const hr2 = Math.pow(Math.min(W, H) * 0.07, 2);
  if (sunAngle < Math.PI) {
    const s = getSunPos(sunAngle);
    if ((px-s.x)**2 + (py-s.y)**2 < hr2) return { what:'sun' };
  }
  if (sunAngle > Math.PI && sunAngle < 2 * Math.PI) {
    const mA = sunAngle - Math.PI;
    const mx = arcCX - Math.cos(mA)*arcRX, my = arcCY - Math.sin(mA)*arcRY;
    if (my < horizonY && (px-mx)**2 + (py-my)**2 < hr2) return { what:'moon' };
  }
  for (let i = sceneObjects.length - 1; i >= 0; i--) {
    if (hitTestSceneObj(sceneObjects[i], px, py)) return { what:'sceneObj', obj:sceneObjects[i] };
  }
  return null;
}
function isNearSun(px,py){ const h=findDraggableAtPointer(px,py); return h&&h.what==='sun'; }

function applyDrag(px, py) {
  if (draggingWhat === 'sun') {
    sunAngle = angleFromPointerFull(px, py);
    syncSliderToAngle();
  } else if (draggingWhat === 'moon') {
    sunAngle = angleFromPointer(px, py) + Math.PI;
    syncSliderToAngle();
  } else if (draggingWhat === 'sceneObj' && draggingSceneObj) {
    draggingSceneObj.xFrac = Math.max(0.01, Math.min(0.99, px / W));
    const rawDepth = (py - horizonY) / (H - horizonY);
    draggingSceneObj.depth = Math.max(0.05, Math.min(0.92, rawDepth));
    sceneObjects.sort((a, b) => a.depth - b.depth);
  }
  draw();
}

canvas.addEventListener('mousedown', e => {
  const hit = findDraggableAtPointer(e.clientX, e.clientY);
  if (hit) {
    draggingWhat = hit.what; draggingSceneObj = hit.obj || null; dragging = true;
    if (hit.what === 'sun' || hit.what === 'moon') stopAutoPlay();
    instructionsEl.style.opacity = '0';
    canvas.style.cursor = 'grabbing'; draw();
  }
});
window.addEventListener('mousemove', e => {
  if (draggingWhat) {
    applyDrag(e.clientX, e.clientY);
    canvas.style.cursor = 'grabbing';
  } else {
    const hit = findDraggableAtPointer(e.clientX, e.clientY);
    canvas.style.cursor = hit ? 'grab' : 'default';
  }
});
window.addEventListener('mouseup', () => {
  dragging = false; draggingWhat = null; draggingSceneObj = null;
  canvas.style.cursor = 'default';
});

canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const hit = findDraggableAtPointer(t.clientX, t.clientY);
  if (hit) {
    draggingWhat = hit.what; draggingSceneObj = hit.obj || null; dragging = true;
    if (hit.what === 'sun' || hit.what === 'moon') stopAutoPlay();
    instructionsEl.style.opacity = '0'; e.preventDefault(); draw();
  }
}, {passive: false});
window.addEventListener('touchmove', e => {
  if (draggingWhat) { applyDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }
}, {passive: false});
window.addEventListener('touchend', () => { dragging = false; draggingWhat = null; draggingSceneObj = null; });

// ============================================================
// INITIALIZE
// ============================================================
initSunFromClock();     // Set sun position from device clock
draw();                 // Initial render

function animate(){ draw(); requestAnimationFrame(animate); }
setTimeout(()=>{ instructionsEl.style.opacity='0'; }, 5000);
animate();
</script>
</body>
